name: crawl

on:
  schedule:
    - cron: "6 * * * *"    # hourly (UTC); accumulates into the day's archive
  #workflow_dispatch: {}    # manual "Run workflow" button

permissions:
  contents: write          # allow committing crawled.json

concurrency:
  group: crawl
  cancel-in-progress: false

jobs:
  crawl:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Crawl feeds
        run: python3 crawler.py   # stdlib only, no pip install

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add crawled.json archive
          if ! git diff --cached --quiet; then
            git commit -m "chore: daily crawl [skip ci]"
            git pull --rebase origin main
            git push
          else
            echo "no changes"
          fi
