name: crawl

on:
  # Triggered by the Cloudflare Worker cron (cron-worker/) via the GitHub API —
  # GitHub's own schedule: is best-effort and drifts/skips under load.
  workflow_dispatch: {}
  # Optional safety net if the Worker ever fails (GitHub still best-effort):
  # schedule:
  #   - cron: "0 */6 * * *"

permissions:
  contents: write          # allow committing crawled.json

concurrency:
  group: crawl
  cancel-in-progress: false

jobs:
  crawl:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Crawl feeds
        run: python3 crawler.py   # stdlib only, no pip install

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add crawled.json archive/ index.html colors.js sitemap.xml
          if ! git diff --cached --quiet; then
            git commit -m "chore: hourly crawl"
            git pull --rebase origin main
            git push
          else
            echo "no changes"
          fi
