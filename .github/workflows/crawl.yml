name: crawl

on:
  schedule:
    - cron: "0 * * * *"   # hourly (UTC); GitHub may delay under load
  workflow_dispatch: {}    # manual "Run workflow" button

permissions:
  contents: write          # allow committing crawled.json

concurrency:
  group: crawl
  cancel-in-progress: false

jobs:
  crawl:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Crawl feeds
        run: python3 crawler.py   # stdlib only, no pip install

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if ! git diff --quiet -- crawled.json; then
            git add crawled.json
            git commit -m "chore: refresh crawled.json [skip ci]"
            git push
          else
            echo "no changes"
          fi
