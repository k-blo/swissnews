name: crawl

on:
  # Triggered by the Cloudflare Worker cron (cron-worker/) via the GitHub API —
  # GitHub's own schedule: is best-effort and drifts/skips under load.
  workflow_dispatch: {}
  # Optional safety net if the Worker ever fails (GitHub still best-effort):
  # schedule:
  #   - cron: "0 */6 * * *"

permissions:
  contents: write          # allow committing crawled.json

concurrency:
  group: crawl
  cancel-in-progress: false

jobs:
  crawl:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Check proxy config
        run: |
          [ -n "$CF_PROXY_URL" ] && echo "CF_PROXY_URL is set" || echo "CF_PROXY_URL is EMPTY"
          [ -n "$CF_PROXY_TOKEN" ] && echo "CF_PROXY_TOKEN is set" || echo "CF_PROXY_TOKEN is EMPTY"
          case "$CF_PROXY_URL" in
            *proxy.swissnews.org*) echo "Proxy host: custom-domain" ;;
            *workers.dev*) echo "Proxy host: workers-dev (secret NOT updated)" ;;
            *) echo "Proxy host: other/unexpected" ;;
          esac
          ENCODED="https%3A%2F%2Fwww.luzernerzeitung.ch%2Fsitemap%2F2026%2F06%2Fsitemap.xml"
          echo "=== Proxy response headers ==="
          curl -s -D - -o /tmp/body -A "Mozilla/5.0 (compatible; SwissNewsBot/0.1)" \
            "$CF_PROXY_URL/proxy?token=$CF_PROXY_TOKEN&url=$ENCODED" \
            | grep -iE "^HTTP/|^x-proxy-reached|^x-upstream-status|^server|^cf-mitigated" || true
          echo "=== Body snippet ==="
          head -c 300 /tmp/body; echo
        env:
          CF_PROXY_URL: ${{ secrets.CF_PROXY_URL }}
          CF_PROXY_TOKEN: ${{ secrets.CF_PROXY_TOKEN }}

      - name: Crawl feeds
        run: python3 crawler.py   # stdlib only, no pip install
        env:
          CF_PROXY_URL: ${{ secrets.CF_PROXY_URL }}
          CF_PROXY_TOKEN: ${{ secrets.CF_PROXY_TOKEN }}

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add crawled.json archive/ index.html colors.js sitemap.xml
          if ! git diff --cached --quiet; then
            git commit -m "chore: hourly crawl"
            git pull --rebase origin main
            git push
          else
            echo "no changes"
          fi
