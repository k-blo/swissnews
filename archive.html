<body>
  <h1><a href="index.html" style="text-decoration:none;color:inherit"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 320" style="height:0.85em;vertical-align:-0.1em"><rect width="320" height="320" fill="#FF0000"/><rect x="130" y="60" width="60" height="200" fill="white"/><rect x="60" y="130" width="200" height="60" fill="white"/></svg> swissnews</a> — archiv</h1>
  <ul id="list"></ul>
  <script>
    fetch("archive/index.json")
      .then((r) => r.json())
      .then((idx) => {
        const list = document.getElementById("list");
        for (const d of (idx.dates || [])) {
          const li = document.createElement("li");
          const a = document.createElement("a");
          a.href = `archive/${d}.html`;
          a.textContent = d;
          li.appendChild(a);
          list.appendChild(li);
        }
      })
      .catch(() => {
        document.getElementById("list").textContent = "archiv nicht verfügbar";
      });
  </script>
</body>
