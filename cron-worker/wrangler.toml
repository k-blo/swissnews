name = "swissnews-cron"
main = "src/worker.js"
compatibility_date = "2024-11-01"

# Reliable hourly trigger (Cloudflare cron, unlike GitHub's best-effort schedule).
[triggers]
crons = ["*/30 * * * *"]

# Custom domain on our own zone — workers.dev's baseline bot management 403s
# datacenter IPs (GitHub Actions/Azure), so the /proxy endpoint needs this host.
[[routes]]
pattern = "proxy.swissnews.org"
custom_domain = true

[vars]
OWNER = "k-blo"           # GitHub user/org
REPO = "suisse-news"      # exact GitHub repo name (used in API URL)
WORKFLOW = "crawl.yml"    # workflow filename in .github/workflows/
REF = "main"              # branch to run on

# Secrets (NOT here): set with `wrangler secret put <name>`
#   GITHUB_TOKEN  — fine-grained PAT, repo = swissnews, Actions = Read and write
#   PROXY_TOKEN   — random string; also set as CF_PROXY_TOKEN in GitHub Actions secrets
